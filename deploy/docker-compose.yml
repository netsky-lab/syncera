# Research Lab — web UI deploy compose.
#
# Usage on the server:
#   1. Copy this file + the build context to the server (see deploy/README.md).
#   2. Set BASIC_AUTH_PASS in .env next to this file.
#   3. rsync the projects/ directory to the server (persistent volume).
#   4. docker compose up -d --build
#
# The container serves on port 3000; put a reverse proxy (caddy/nginx/traefik)
# in front for TLS.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: research-lab-searxng
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      INSTANCE_NAME: research-lab
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    container_name: research-lab-web
    restart: unless-stopped
    ports:
      # Publish on all interfaces so the site is reachable from the internet.
      # Basic Auth + HTTPS (via reverse proxy) is recommended for production;
      # without TLS the password travels in clear text — see deploy/README.md.
      - "3000:3000"
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-research}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:?BASIC_AUTH_PASS must be set in .env}
      # Comma-separated list of accepted API keys for /api/* endpoints.
      # If unset, API routes require Basic Auth.
      API_KEYS: ${API_KEYS:-}
      # CORS: "*" permissive (dev); pin to consumer origin in production.
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-*}
      # Requests per minute per identity (API key or basic-auth).
      API_RATE_LIMIT_PER_MIN: ${API_RATE_LIMIT_PER_MIN:-60}
      # Session cookie signing secret. MUST be set in production — 32+ chars.
      # Generate with: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Paths for file-backed stores. Absolute so cwd differences
      # (standalone server.js runs from /app/apps/web) don't matter.
      USER_STORE_PATH: /app/data/users.json
      KEY_STORE_PATH: /app/data/api_keys.json
      # Bootstrap admin user on first start (seeded to users.json).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Open signup (default: first user becomes admin, rest require invite).
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-0}
      NODE_ENV: production
      # LLM endpoint + search used when the web UI spawns a pipeline run.
      # Override via deploy/.env.
      SEARXNG_URL: ${SEARXNG_URL:-http://research-lab-searxng:8080}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:?GEMMA_BASE_URL must be set in .env (LLM endpoint)}
      GEMMA_MODEL: ${GEMMA_MODEL:-qwen3.6-35b-a3b}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-dummy}
      # The web container spawns sibling pipeline containers via the host
      # docker daemon. They need to know the host-side path to bind-mount
      # and the compose network to attach to.
      PIPELINE_HOST_REPO_ROOT: ${PIPELINE_HOST_REPO_ROOT:-/opt/research-lab}
      PIPELINE_NETWORK: ${PIPELINE_NETWORK:-deploy_default}
    volumes:
      # Writable mount — the pipeline (spawned from the web container)
      # writes new project artifacts here. Web UI serves them fresh.
      - ../projects:/app/projects:rw
      # Persistent storage for app data (API keys, future sessions).
      # Survives container rebuilds.
      - ../data:/app/data:rw
      # Docker-out-of-docker: let the web container talk to the host
      # daemon so it can run pipeline containers on the same compose
      # network as searxng.
      - /var/run/docker.sock:/var/run/docker.sock
    # Add the host-side docker group GID to this container's supplementary
    # groups so the `app` user can read /var/run/docker.sock. Override via
    # DOCKER_GID in deploy/.env if the host uses a different GID — on this
    # server it's 988. Check with `stat -c %g /var/run/docker.sock`.
    group_add:
      - "${DOCKER_GID:-988}"
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
