# Syncera — web UI deploy compose.
#
# Usage on the server:
#   1. Copy this file + the build context to the server (see deploy/README.md).
#   2. Create deploy/.env from deploy/.env.example.
#   3. rsync the projects/ directory to the server (persistent volume).
#   4. docker compose up -d --build
#
# The container serves on port 3000; put a reverse proxy (caddy/nginx/traefik)
# in front for TLS.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: syncera-searxng
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://localhost:8080/
      INSTANCE_NAME: syncera
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    build:
      context: ../
      dockerfile: apps/web/Dockerfile
    container_name: syncera-web
    restart: unless-stopped
    ports:
      # Publish on all interfaces so the site is reachable from the internet.
      # HTTPS via reverse proxy is required for production.
      - "80:3000"
      - "3000:3000"
    environment:
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:-research}
      BASIC_AUTH_PASS: ${BASIC_AUTH_PASS:-}
      # Comma-separated list of accepted API keys for /api/* endpoints.
      # If unset, API routes require Basic Auth.
      API_KEYS: ${API_KEYS:-}
      # CORS: empty is fail-closed. Pin to consumer origin(s) when exposing API cross-origin.
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-}
      # Requests per minute per identity (API key or basic-auth).
      API_RATE_LIMIT_PER_MIN: ${API_RATE_LIMIT_PER_MIN:-60}
      # Session cookie signing secret. MUST be set in production — 32+ chars.
      # Generate with: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:-}
      # Paths for file-backed stores. Absolute so cwd differences
      # (standalone server.js runs from /app/apps/web) don't matter.
      USER_STORE_PATH: /app/data/users.json
      KEY_STORE_PATH: /app/data/api_keys.json
      SHARE_TOKEN_STORE_PATH: /app/data/share_tokens.json
      # Bootstrap admin user on first start (seeded to users.json).
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      BOOTSTRAP_TOKEN: ${BOOTSTRAP_TOKEN:-}
      # Open signup (default: first user becomes admin, rest require invite).
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-0}
      # Public base URL used in webhook payload's `artifacts.*` links.
      # Must be externally reachable by the webhook consumer.
      PUBLIC_URL: ${PUBLIC_URL:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-}
      RESEND_REPLY_TO: ${RESEND_REPLY_TO:-}
      NODE_ENV: production
      # LLM endpoint + search used when the web UI spawns a pipeline run.
      # Override via deploy/.env.
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      LLM_PROVIDER: ${LLM_PROVIDER:-qwen}
      LLM_STREAM: ${LLM_STREAM:-0}
      LLM_MAX_CONCURRENCY: ${LLM_MAX_CONCURRENCY:-8}
      QWEN_BASE_URL: ${QWEN_BASE_URL:-}
      QWEN_MODEL: ${QWEN_MODEL:-qwen3.6-35b-a3b}
      QWEN_API_KEY: ${QWEN_API_KEY:-dummy}
      QWEN_FALLBACK_URLS: ${QWEN_FALLBACK_URLS:-}
      GEMMA_BASE_URL: ${GEMMA_BASE_URL:-}
      GEMMA_MODEL: ${GEMMA_MODEL:-qwen3.6-35b-a3b}
      GEMMA_API_KEY: ${GEMMA_API_KEY:-dummy}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3-flash-preview}
      GEMINI_REASONING_EFFORT: ${GEMINI_REASONING_EFFORT:-low}
      GEMINI_SEARCH_GROUNDING: ${GEMINI_SEARCH_GROUNDING:-0}
      GEMINI_SEARCH_MAX_RESULTS: ${GEMINI_SEARCH_MAX_RESULTS:-5}
      GEMINI_SEARCH_TIMEOUT_MS: ${GEMINI_SEARCH_TIMEOUT_MS:-20000}
      CONCURRENCY_HARVEST: ${CONCURRENCY_HARVEST:-}
      CONCURRENCY_EVIDENCE: ${CONCURRENCY_EVIDENCE:-}
      CONCURRENCY_ANALYZER: ${CONCURRENCY_ANALYZER:-}
      CONCURRENCY_RELEVANCE: ${CONCURRENCY_RELEVANCE:-}
      CONCURRENCY_VERIFIER: ${CONCURRENCY_VERIFIER:-}
      EVIDENCE_LEARNINGS_PER_BATCH: ${EVIDENCE_LEARNINGS_PER_BATCH:-}
      EVIDENCE_MAX_TOKENS: ${EVIDENCE_MAX_TOKENS:-}
      HARVEST_BREADTH: ${HARVEST_BREADTH:-}
      HARVEST_DEPTH: ${HARVEST_DEPTH:-}
      HARVEST_PAGES_PER_QUERY: ${HARVEST_PAGES_PER_QUERY:-}
      HARVEST_URLS_PER_QUERY: ${HARVEST_URLS_PER_QUERY:-}
      HARVEST_READ_CONCURRENCY: ${HARVEST_READ_CONCURRENCY:-}
      MAX_HARVEST_MINUTES: ${MAX_HARVEST_MINUTES:-}
      MAX_HARVEST_SOURCES: ${MAX_HARVEST_SOURCES:-}
      SNOWBALL_MAX_PAPERS: ${SNOWBALL_MAX_PAPERS:-}
      PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH: ${PLAYWRIGHT_CHROMIUM_EXECUTABLE_PATH:-}
      # The web container spawns sibling pipeline containers via the host
      # docker daemon. They need to know the host-side path to bind-mount
      # and the compose network to attach to.
      PIPELINE_HOST_REPO_ROOT: ${PIPELINE_HOST_REPO_ROOT:-/opt/syncera}
      PIPELINE_NETWORK: ${PIPELINE_NETWORK:-deploy_default}
    volumes:
      # Writable mount — the pipeline (spawned from the web container)
      # writes new project artifacts here. Web UI serves them fresh.
      - ../projects:/app/projects:rw
      # Persistent storage for app data (API keys, future sessions).
      # Survives container rebuilds.
      - ../data:/app/data:rw
      # Docker-out-of-docker: let the web container talk to the host
      # daemon so it can run pipeline containers on the same compose
      # network as searxng.
      - /var/run/docker.sock:/var/run/docker.sock
    # Add the host-side docker group GID to this container's supplementary
    # groups so the `app` user can read /var/run/docker.sock. Override via
    # DOCKER_GID in deploy/.env if the host uses a different GID — on this
    # server it's 988. Check with `stat -c %g /var/run/docker.sock`.
    group_add:
      - "${DOCKER_GID:-988}"
    depends_on:
      searxng:
        condition: service_healthy
    healthcheck:
      # Use 127.0.0.1 not localhost — the container's /etc/hosts lists
      # `::1 localhost` first, so wget tries IPv6 and gets Connection
      # refused since Next.js binds IPv4 0.0.0.0:3000.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
